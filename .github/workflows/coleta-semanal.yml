name: "Coleta Semanal Automatizada"

on:
  schedule:
    - cron: "0 3 * * 0" # Domingos 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coleta-semanal
  cancel-in-progress: false

jobs:
  coleta:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write # commit dos dados atualizados

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run coleta-camara
        run: python scripts/coleta-camara.py --limit 20

      - name: Run gerar-dashboard
        run: python scripts/gerar-dashboard.py

      - name: Commit changes (if any)
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "Sem mudancas nos dados."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore(data): atualizacao automatica semanal"
          git push
